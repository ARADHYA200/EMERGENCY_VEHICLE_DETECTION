services:
  - type: web
    name: emergency-vehicle-detection
    runtime: python

    envVars:
      - key: PYTHON_VERSION
        value: 3.10.13

    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: |
      streamlit run app/app.py --server.port=$PORT --server.address=0.0.0.0